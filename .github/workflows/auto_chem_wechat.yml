name: Auto Chem Paper to WeChat Article

on:
  schedule:
    # 每天 UTC 01:00 运行；北京时间约 09:00
    - cron: "0 1 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "忽略 seen_dois，强制从最近论文里生成测试文章"
        required: false
        default: "false"
      days:
        description: "回看最近几天"
        required: false
        default: "3"
      max_articles:
        description: "最多生成几篇文章"
        required: false
        default: "2"

permissions:
  contents: write

env:
  PYTHONUTF8: "1"
  UNPAYWALL_EMAIL: ${{ secrets.UNPAYWALL_EMAIL }}

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Linux dependencies for PDF/image processing
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libglib2.0-0 libcairo2 libpango-1.0-0 libpangoft2-1.0-0 libgdk-pixbuf-2.0-0 libffi-dev shared-mime-info

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run open paper pipeline
        shell: bash
        run: |
          FORCE_FLAG=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi
          DAYS="${{ github.event.inputs.days }}"
          MAX_ARTICLES="${{ github.event.inputs.max_articles }}"
          if [ -z "$DAYS" ]; then DAYS="3"; fi
          if [ -z "$MAX_ARTICLES" ]; then MAX_ARTICLES="2"; fi
          python scripts/auto_chem_wechat_pipeline.py \
            --days "$DAYS" \
            --max-articles "$MAX_ARTICLES" \
            $FORCE_FLAG

      - name: Upload generated article packages
        uses: actions/upload-artifact@v4
        with:
          name: chem-wechat-article-packages
          path: |
            output/articles/**
            output/report.csv
            output/candidates.json
          if-no-files-found: warn
          retention-days: 14

      - name: Commit seen DOI state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/seen_dois.json output/report.csv output/candidates.json || true
          if git diff --cached --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "Update paper monitor state [skip ci]"
            git push
          fi
