name: Auto Chem Paper to WeChat Article

on:
  schedule:
    # Run every 2 hours. GitHub cron uses UTC.
    - cron: "0 */2 * * *"

  workflow_dispatch:
    inputs:
      force:
        description: "Ignore seen_dois and force a test article from recent papers"
        required: false
        default: "false"
      days:
        description: "Look back this many days"
        required: false
        default: "3"
      max_articles:
        description: "Maximum generated articles"
        required: false
        default: "1"

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      PYTHONUTF8: "1"
      UNPAYWALL_EMAIL: ${{ secrets.UNPAYWALL_EMAIL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1 \
            libglib2.0-0 \
            libcairo2 \
            libpango-1.0-0 \
            libpangoft2-1.0-0 \
            libgdk-pixbuf-2.0-0 \
            libffi-dev \
            shared-mime-info

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check required paper lookup secrets
        run: |
          if [ -z "$UNPAYWALL_EMAIL" ]; then
            echo "Missing UNPAYWALL_EMAIL. Add it in GitHub Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Run auto chemistry paper workflow
        run: |
          FORCE_FLAG=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi

          DAYS="${{ github.event.inputs.days }}"
          MAX_ARTICLES="${{ github.event.inputs.max_articles }}"

          if [ -z "$DAYS" ]; then DAYS="3"; fi
          if [ -z "$MAX_ARTICLES" ]; then MAX_ARTICLES="1"; fi

          python scripts/auto_chem_wechat_pipeline.py \
            --days "$DAYS" \
            --max-articles "$MAX_ARTICLES" \
            $FORCE_FLAG

      - name: Upload generated article packages
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: chem-wechat-article-packages
          path: |
            output/articles
            output/report.csv
            output/candidates.json
            output/auto_pipeline.log

      - name: Commit monitor state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add state/seen_dois.json || true

          if git diff --cached --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "Update paper monitor state [skip ci]"
            git push
          fi
