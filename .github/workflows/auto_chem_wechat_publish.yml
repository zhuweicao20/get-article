name: Auto Chem Paper to WeChat Publish

on:
  workflow_dispatch:
    inputs:
      force:
        description: "忽略 seen_dois，强制从最近论文里生成并发布测试文章"
        required: false
        default: "false"
      days:
        description: "回看最近几天"
        required: false
        default: "3"
      max_articles:
        description: "最多生成并发布几篇文章"
        required: false
        default: "1"
      mode:
        description: "draft 保存草稿；publish 提交发布"
        required: true
        default: "publish"
        type: choice
        options:
          - draft
          - publish

permissions:
  contents: write
  actions: read

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest

    env:
      PYTHONUTF8: "1"
      UNPAYWALL_EMAIL: ${{ secrets.UNPAYWALL_EMAIL }}
      WECHAT_APPID: ${{ secrets.WECHAT_APPID }}
      WECHAT_APPSECRET: ${{ secrets.WECHAT_APPSECRET }}
      WECHAT_AUTHOR: ${{ secrets.WECHAT_AUTHOR }}
      WECHAT_SOURCE_URL: ${{ secrets.WECHAT_SOURCE_URL }}
      WECHAT_NEED_OPEN_COMMENT: ${{ secrets.WECHAT_NEED_OPEN_COMMENT }}
      WECHAT_ONLY_FANS_CAN_COMMENT: ${{ secrets.WECHAT_ONLY_FANS_CAN_COMMENT }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1 \
            libglib2.0-0 \
            libcairo2 \
            libpango-1.0-0 \
            libpangoft2-1.0-0 \
            libgdk-pixbuf-2.0-0 \
            libffi-dev \
            shared-mime-info

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate article packages from new papers
        run: |
          FORCE_FLAG=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi

          DAYS="${{ github.event.inputs.days }}"
          MAX_ARTICLES="${{ github.event.inputs.max_articles }}"

          if [ -z "$DAYS" ]; then DAYS="3"; fi
          if [ -z "$MAX_ARTICLES" ]; then MAX_ARTICLES="1"; fi

          python scripts/auto_chem_wechat_pipeline.py \
            --days "$DAYS" \
            --max-articles "$MAX_ARTICLES" \
            $FORCE_FLAG

      - name: Publish newest generated article to WeChat
        run: |
          python scripts/wechat_official_publish.py \
            --article-root output/articles \
            --mode "${{ github.event.inputs.mode }}"

      - name: Upload generated article and WeChat result
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: auto-chem-wechat-publish-result
          path: |
            output/articles
            output/report.csv
            output/candidates.json
            output/wechat_publish_result.json

      - name: Commit monitor state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add state/seen_dois.json || true

          if git diff --cached --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "Update paper monitor state [skip ci]"
            git push
          fi
